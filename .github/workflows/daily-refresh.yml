name: Daily refresh

on:
  schedule:
    # GitHub Actions cron is best-effort and is most delayed/dropped at the top
    # of an hour, so we use an off-:00 minute and run twice. The script early-exits
    # if it already refreshed today, so the second slot is a free retry, not a
    # double update. Times are UTC.
    - cron: '17 10 * * *'   # ~06:17 ET — primary
    - cron: '17 16 * * *'   # ~12:17 ET — backstop
  workflow_dispatch: {}   # Allow manual triggering from the Actions tab

permissions:
  contents: write
  issues: write   # for the failure-notification step

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet 'anthropic>=0.39,<1.0'

      - name: Run daily refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_refresh.py

      - name: Verify index.html integrity
        run: |
          lines=$(wc -l < index.html)
          echo "index.html: $lines lines"
          if [ "$lines" -lt 4000 ]; then
            echo "::error::index.html is only $lines lines — looks truncated. Aborting before commit."; exit 1
          fi
          if ! tail -2 index.html | grep -q '</html>'; then
            echo "::error::index.html does not end with </html> — looks truncated. Aborting before commit."; exit 1
          fi
          for tag in '</script>' '</body>' '</html>'; do
            grep -q "$tag" index.html || { echo "::error::index.html missing $tag — aborting before commit."; exit 1; }
          done
          echo "index.html integrity OK"

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain index.html)" ]]; then
            echo "No changes to index.html — nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Daily refresh ($(date -u +'%Y-%m-%d'))"
          git push

      - name: Report failure as an issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh issue list --state open --search "Daily refresh failing in:title" --json number --jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "An open 'Daily refresh failing' issue already exists — not creating a duplicate."
            exit 0
          fi
          gh issue create \
            --title "⚠️ Daily refresh failing" \
            --body "The daily-refresh workflow failed on $(date -u +'%Y-%m-%d'). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Close this issue once the refresh is healthy again — it won't be recreated while it stays open."
