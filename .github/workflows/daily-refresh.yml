name: Twice-daily dashboard refresh

on:
  schedule:
    - cron: "0 6,14 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --quiet "anthropic>=0.39,<1.0"

      - name: Pull every public-data feed
        id: public_data
        continue-on-error: true
        working-directory: scripts
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          failed=0
          for script in \
            fetch_grid.py \
            fetch_power_econ.py \
            build_queues.py \
            build_siting.py \
            fetch_gpu_prices.py \
            fetch_sec_filings.py
          do
            echo "::group::$script"
            python "$script" || failed=1
            echo "::endgroup::"
          done
          exit "$failed"

      - name: Refresh public news and primary-source signals
        id: news
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_refresh.py

      - name: Rebuild derived signals and daily history
        id: derived
        continue-on-error: true
        run: |
          failed=0
          python scripts/propose_connections.py || failed=1
          python scripts/archive_history.py || failed=1
          exit "$failed"

      - name: Verify generated feeds
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          checks = {
              "current.json": ("lastUpdated", "topStory"),
              "grid.json": ("lastUpdated", "regions"),
              "power_econ.json": ("lastUpdated", "states"),
              "queues.json": ("lastUpdated", "iso"),
              "siting.json": ("lastUpdated", "states"),
              "gpu_prices.json": ("checked_at", "providers"),
              "sec_filings.json": ("lastUpdated", "companies"),
          }
          for filename, required in checks.items():
              path = Path("data") / filename
              payload = json.loads(path.read_text(encoding="utf-8"))
              missing = [key for key in required if not payload.get(key)]
              assert not missing, f"{filename} missing/non-populated fields: {missing}"
              print(f"{filename}: OK")
          PY

      - name: Commit and push if changed
        id: commit
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "No generated data changed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/current.json \
            data/grid.json \
            data/power_econ.json \
            data/queues.json \
            data/siting.json \
            data/gpu_prices.json \
            data/sec_filings.json \
            data/connections.proposals.json \
            data/changes.json \
            data/history/*.csv
          stamp=$(TZ=America/Los_Angeles date +"%Y-%m-%d %I:%M %p PT")
          git commit -m "chore(data): twice-daily refresh ($stamp)"
          git push

      - name: Surface partial refresh failures
        if: always() && (steps.public_data.outcome == 'failure' || steps.news.outcome == 'failure' || steps.derived.outcome == 'failure')
        run: |
          echo "At least one refresh stage failed after the remaining sources were attempted and committed."
          exit 1

      - name: Report failure as an issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh issue list --state open --search "Dashboard refresh failing in:title" --json number --jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "An open dashboard-refresh issue already exists; not creating a duplicate."
            exit 0
          fi
          gh issue create \
            --title "Dashboard refresh failing" \
            --body "The twice-daily refresh failed on $(date -u +'%Y-%m-%d'). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
