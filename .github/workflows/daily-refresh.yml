name: Daily refresh

on:
  schedule:
    # 11:00 UTC = 07:00 EST / 06:00 EDT. Adjust if you want a different morning hour.
    - cron: '0 11 * * *'
  workflow_dispatch: {}   # Allow manual triggering from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet 'anthropic>=0.39,<1.0'

      - name: Run daily refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_refresh.py

      - name: Verify index.html integrity
        run: |
          lines=$(wc -l < index.html)
          echo "index.html: $lines lines"
          if [ "$lines" -lt 4000 ]; then
            echo "::error::index.html is only $lines lines — looks truncated. Aborting before commit."; exit 1
          fi
          if ! tail -2 index.html | grep -q '</html>'; then
            echo "::error::index.html does not end with </html> — looks truncated. Aborting before commit."; exit 1
          fi
          for tag in '</script>' '</body>' '</html>'; do
            grep -q "$tag" index.html || { echo "::error::index.html missing $tag — aborting before commit."; exit 1; }
          done
          echo "index.html integrity OK"

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain index.html)" ]]; then
            echo "No changes to index.html — nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Daily refresh ($(date -u +'%Y-%m-%d'))"
          git push
