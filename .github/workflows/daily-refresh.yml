name: Daily refresh

on:
  schedule:
    - cron: '17 10 * * *'   # ~06:17 ET — primary
    - cron: '17 16 * * *'   # ~12:17 ET — backstop
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet 'anthropic>=0.39,<1.0'

      - name: Run daily refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_refresh.py

      - name: Verify current.json integrity
        run: |
          python -c "import json; d=json.load(open('data/current.json',encoding='utf-8')); assert d.get('lastUpdated') and d.get('topStory',{}).get('url'), 'current.json missing fields'; print('current.json OK', d['lastUpdated'])"

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain data/current.json)" ]]; then
            echo "No changes to data/current.json — nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/current.json
          git commit -m "Daily refresh ($(date -u +'%Y-%m-%d'))"
          git push

      - name: Report failure as an issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh issue list --state open --search "Daily refresh failing in:title" --json number --jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "An open 'Daily refresh failing' issue already exists — not creating a duplicate."
            exit 0
          fi
          gh issue create \
            --title "⚠️ Daily refresh failing" \
            --body "The daily-refresh workflow failed on $(date -u +'%Y-%m-%d'). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
