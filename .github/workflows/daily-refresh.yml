name: Daily refresh

on:
  schedule:
    # 11:00 UTC = 07:00 EST / 06:00 EDT. Adjust if you want a different morning hour.
    - cron: '0 11 * * *'
  workflow_dispatch: {}   # Allow manual triggering from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet 'anthropic>=0.39,<1.0'

      - name: Run daily refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_refresh.py

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain index.html)" ]]; then
            echo "No changes to index.html — nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Daily refresh ($(date -u +'%Y-%m-%d'))"
          git push
