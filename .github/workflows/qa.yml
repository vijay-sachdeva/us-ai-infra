name: qa

# Two independent jobs:
#   * data-quality  -- fast, offline; runs on every push/PR. The merge gate.
#   * link-check    -- networked; weekly cron + manual. Never blocks merges
#                      (only runs on schedule/dispatch, not on push/PR).

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC -- weekly link + freshness sweep
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  data-quality:
    # The per-push merge gate. Runs on push/PR (and is harmless on cron too).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test deps
        run: python -m pip install --upgrade pip jsonschema pytest
      - name: Data-quality tests (schema, sync, structural)
        run: python -m pytest tests/test_data_quality.py -v

  link-check:
    # Networked link-rot + freshness sweep. Scheduled/manual only, so it never
    # gates a merge. Marked continue-on-error as belt-and-suspenders: a flaky
    # network run should not page anyone.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest
      - name: Link-rot check (non-blocking, high threshold)
        run: python tests/test_links.py
      - name: Freshness check (warn-only)
        run: python tests/test_freshness.py
