name: Public-data recovery (manual)

# Scheduled refreshes run through daily-refresh.yml so public feeds, SEC filings,
# news, validation, history, and the commit share one atomic refresh contract.
# This workflow remains as a data-only recovery path for maintainers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate feeds
        working-directory: scripts
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python fetch_grid.py
          python fetch_power_econ.py
          python build_queues.py
          python build_siting.py
          python fetch_gpu_prices.py
          python fetch_sec_filings.py
          python propose_connections.py
      - name: Archive history
        run: python scripts/archive_history.py
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/history/*.csv
          git commit -m "chore(data): manual public-feed recovery" || echo "no changes"
          git push
