name: refresh-data

on:
  schedule:
    - cron: "30 11 * * *"      # after the morning news-refresh job; off-:00 to dodge GHA congestion
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate feeds
        working-directory: scripts
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python fetch_grid.py
          python fetch_power_econ.py
          python build_queues.py
          python build_siting.py
      - name: Archive history (append today's snapshot)
        run: python scripts/archive_history.py
      - name: Commit data
        run: |
          git config user.name  "data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/*.json data/history/*.csv
          git commit -m "chore(data): refresh public feeds" || echo "no changes"
          git push
